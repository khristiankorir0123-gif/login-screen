<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-OS | Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --accent: #007aff; --glass: rgba(255, 255, 255, 0.05); }
        
        body { 
            background: #000; 
            color: white; 
            font-family: -apple-system, sans-serif; 
            margin: 0; 
            min-height: 100vh; /* Changed from height: 100vh to allow scrolling */
            overflow-x: hidden;
            overflow-y: auto; /* Ensures you can swipe down on mobile */
        }

        /* Desktop Layout (Standard Grid) */
        .bento-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr; 
            grid-template-rows: 180px 500px; /* Fixed height for desktop look */
            gap: 20px;
            padding: 30px;
            box-sizing: border-box;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 850px) {
            .bento-grid {
                grid-template-columns: 1fr; /* Stack everything in one column */
                grid-template-rows: auto;    /* Let tiles dictate their own height */
                padding: 15px;
                gap: 15px;
            }
            
            .tile {
                min-height: 200px; /* Prevents tiles from being too flat */
            }

            #clock { font-size: 2.2rem; } /* Shrink text slightly for small screens */
            
            .calendar, .news-tile {
                height: 450px; /* Give widgets enough room to be useful */
            }
        }

        .tile { 
            background: #111; 
            border-radius: 28px; 
            border: 1px solid #222; 
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        /* Apple Wiggle */
        @keyframes wiggle {
            0% { transform: rotate(-1deg); }
            50% { transform: rotate(1deg); }
            100% { transform: rotate(-1deg); }
        }

        .editing .tile { animation: wiggle 0.3s infinite; cursor: grab; }
        .editing iframe, .editing rssapp-carousel { pointer-events: none; }

        /* Profile/Clock Styles */
        .profile-section { padding: 25px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        #clock { font-size: 2.8rem; font-weight: 700; line-height: 1; }
        #live-date { color: #888; font-size: 1rem; }
        
        .apps-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border: none !important; background: transparent !important; }
        
        .app-btn {
            background: #111; border: 1px solid #222; border-radius: 24px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; color: white; transition: 0.3s; min-height: 80px;
        }

        .widget-header { padding: 20px; color: var(--accent); font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
        .content-fill { flex: 1; width: 100%; overflow: hidden; }
        .cal-frame { filter: invert(0.9) hue-rotate(180deg) brightness(0.8); width: 100%; height: 100%; border: none; }
        
        .switch-btn, .edit-toggle-btn { 
            background: rgba(255,255,255,0.1); border: none; color: white; 
            padding: 8px 16px; border-radius: 12px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="bento-grid" id="main-grid">
    <!-- Section 1 -->
    <div class="tile profile-section">
        <div style="display: flex; align-items: center;">
            <img id="user-img" src="" style="width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--accent); margin-right: 15px; object-fit: cover;">
            <div>
                <div id="clock">00:00</div>
                <div id="live-date">...</div>
            </div>
        </div>
        <button class="switch-btn" onclick="location.href='https://khristiankorir0123-gif.github.io/login-screen/'">Switch</button>
    </div>

    <!-- Section 2 -->
    <div class="tile apps-section">
        <a href="https://onedrive.live.com" class="app-btn">OneDrive</a>
        <a href="https://vidbox.de" class="app-btn">Vidbox</a>
    </div>

    <!-- Section 3 -->
    <div class="tile" style="justify-content: center; align-items: center;">
        <button class="edit-toggle-btn" onclick="toggleEditMode()">⚙️ Edit Hub</button>
    </div>

    <!-- Section 4 -->
    <div class="tile">
        <div class="widget-header">Live Scores</div>
        <div class="content-fill" id="match-list">
            <div style="padding: 20px; color: #444;">No live matches.</div>
        </div>
    </div>

    <!-- Section 5 (Calendar) -->
    <div class="tile calendar">
        <iframe src="https://calendar.google.com/calendar/embed?src=en.dutch%23holiday%40group.v.calendar.google.com&ctz=Europe%2FAmsterdam" class="cal-frame"></iframe>
    </div>

    <!-- Section 6 (News) -->
    <div class="tile news-tile">
        <div class="widget-header">Headlines</div>
        <div class="content-fill">
            <rssapp-carousel id="tgVNLlUheA584JKg"></rssapp-carousel>
            <script src="https://widget.rss.app/v1/carousel.js" type="text/javascript" async></script>
        </div>
    </div>
</div>

<script>
    let isEditing = false;
    let sortable;

    function toggleEditMode() {
        const grid = document.getElementById('main-grid');
        const btn = document.querySelector('.edit-toggle-btn');
        isEditing = !isEditing;

        if (isEditing) {
            grid.classList.add('editing');
            btn.innerText = "Done";
            sortable = Sortable.create(grid, { animation: 250 });
        } else {
            grid.classList.remove('editing');
            btn.innerText = "⚙️ Edit Hub";
            if(sortable) sortable.destroy();
        }
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('live-date').textContent = now.toLocaleDateString('en-NL', { weekday: 'short', day: 'numeric', month: 'short' });
    }

    window.onload = () => {
        document.getElementById('user-img').src = localStorage.getItem('active_pic') || '';
        updateClock();
        setInterval(updateClock, 1000);
    };
</script>
</body>
</html>
