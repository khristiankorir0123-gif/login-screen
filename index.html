<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>K-OS Login</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .profiles { display: flex; gap: 30px; }
        .profile-card { background: #161616; padding: 20px; border-radius: 20px; width: 150px; text-align: center; cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .profile-card:hover, .profile-card:focus { transform: scale(1.1); border-color: #007aff; outline: none; }
        .avatar { width: 100px; height: 100px; background: #333; border-radius: 50%; margin: 0 auto 15px; background-size: cover; }
    </style>
</head>
<body>
    <h1>Who is watching?</h1>
    <div class="profiles">
        <div class="profile-card" tabindex="1" onclick="login('Khristian')">
            <div class="avatar" style="background-image: url('YOUR_PHOTO_URL');"></div>
            <span>Khristian</span>
        </div>
        <div class="profile-card" tabindex="2" onclick="login('Oliver')">
            <div class="avatar"></div>
            <span>Oliver</span>
        </div>
    </div>

    <script>
        function login(user) {
            localStorage.setItem('currentUser', user);
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
