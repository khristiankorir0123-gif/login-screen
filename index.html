<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-OS | Login</title>
    <style>
        :root { --accent: #007aff; --glass: rgba(255, 255, 255, 0.08); }
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        
        .profile-container { display: flex; gap: 30px; align-items: center; justify-content: center; margin-bottom: 50px; }
        
        .profile-box { text-align: center; cursor: pointer; transition: 0.3s; width: 120px; }
        .profile-box:hover { transform: scale(1.1); }
        .profile-box:focus { outline: none; }
        .profile-box:focus .avatar-circle { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        .avatar-circle { 
            width: 100px; height: 100px; border-radius: 50%; border: 2px solid #333;
            background-size: cover; background-position: center; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 2rem;
        }

        .login-card {
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; width: 320px; display: none; /* Hidden unless adding new */
        }
        
        h1 { font-size: 2rem; margin-bottom: 40px; font-weight: 300; }
        input {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px;
            border: 1px solid #333; background: rgba(0,0,0,0.3); color: white; box-sizing: border-box;
        }
        
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-danger { background: #ff3b30; color: white; margin-top: 30px; width: auto; padding: 10px 20px; }
    </style>
</head>
<body>

    <h1 id="main-title">who is watching?</h1>

    <!-- Selection Area (image_8f3c99.png style) -->
    <div class="profile-container" id="profileList"></div>

    <!-- Registration Card -->
    <div class="login-card" id="regCard">
        <input type="text" id="userName" placeholder="Name">
        <input type="file" id="userPic" accept="image/*" style="margin-bottom: 15px;">
        <button class="btn btn-primary" onclick="createNewProfile()">SAVE & ENTER</button>
        <button class="btn" style="background:#444; color:white;" onclick="toggleReg(false)">CANCEL</button>
    </div>

    <button class="btn-danger" onclick="clearAll()">Delete All Profiles</button>

    <script>
        const HUB_PATH = "https://khristiankorir0123-gif.github.io/hub/Hub.html";

        function renderProfiles() {
            const list = document.getElementById('profileList');
            const users = JSON.parse(localStorage.getItem('k_profiles')) || [];
            list.innerHTML = '';

            users.forEach(user => {
                const div = document.createElement('div');
                div.className = 'profile-box';
                div.tabIndex = 0;
                div.innerHTML = `
                    <div class="avatar-circle" style="background-image: url('${user.pic}')"></div>
                    <div>${user.name}</div>
                `;
                div.onclick = () => selectUser(user);
                list.appendChild(div);
            });

            // The "+" Button
            const addBtn = document.createElement('div');
            addBtn.className = 'profile-box';
            addBtn.innerHTML = `<div class="avatar-circle" style="border-style: dashed;">+</div><div>Add</div>`;
            addBtn.onclick = () => toggleReg(true);
            list.appendChild(addBtn);
        }

        function toggleReg(show) {
            document.getElementById('regCard').style.display = show ? 'block' : 'none';
            document.getElementById('profileList').style.display = show ? 'none' : 'flex';
            document.getElementById('main-title').innerText = show ? 'create profile' : 'who is watching?';
        }

        function createNewProfile() {
            const name = document.getElementById('userName').value;
            const file = document.getElementById('userPic').files[0];
            if (!name || !file) return alert("Enter name and photo");

            const reader = new FileReader();
            reader.onloadend = function() {
                const newUser = { name, pic: reader.result };
                let users = JSON.parse(localStorage.getItem('k_profiles')) || [];
                users.push(newUser);
                localStorage.setItem('k_profiles', JSON.stringify(users));
                selectUser(newUser);
            };
            reader.readAsDataURL(file);
        }

        function selectUser(user) {
            localStorage.setItem('active_user', user.name);
            localStorage.setItem('active_pic', user.pic);
            window.location.href = HUB_PATH;
        }

        function clearAll() {
            if(confirm("Delete all?")) { localStorage.removeItem('k_profiles'); location.reload(); }
        }

        window.onload = renderProfiles;
    </script>
</body>
</html>
